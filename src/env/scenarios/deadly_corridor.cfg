# Escenario deadly_corridor para el agente YOLO.
# El doom_scenario_path (.wad) se inyecta en codigo segun el nombre de este cfg.
# Enemigos: zombiemen (bien representados en el dataset Doom-Enemy-Detection).

doom_skill = 1

screen_resolution = RES_640X480
screen_format = RGB24
window_visible = false
mode = PLAYER

render_hud = true
render_weapon = true
render_crosshair = false
render_particles = true
render_decals = true

living_reward = -0.1
death_penalty = 100

# Orden debe coincidir exactamente con action_to_vizdoom en policy/actions.py
# [MOVE_FORWARD, MOVE_BACKWARD, TURN_LEFT, TURN_RIGHT, ATTACK, USE, MOVE_LEFT, MOVE_RIGHT]
available_buttons = {MOVE_FORWARD MOVE_BACKWARD TURN_LEFT TURN_RIGHT ATTACK USE MOVE_LEFT MOVE_RIGHT}

available_game_variables = {HEALTH AMMO2 KILLCOUNT POSITION_X}

episode_timeout = 4200
episode_start_time = 1
