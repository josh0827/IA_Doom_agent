# Defend the Center: sala circular, enemigos aparecen en los bordes y avanzan
# hacia el centro desde todas direcciones. Sala abierta (no pasillo).
# Reusa el mismo layout de botones/variables que deadly_corridor para que el
# agente entrenado (8 botones, 13 acciones) lo pueda controlar sin reentrenar.
# El .wad (defend_the_center.wad) se inyecta desde los scenarios de ViZDoom.

doom_skill = 2

screen_resolution = RES_640X480
screen_format = RGB24
window_visible = false
mode = PLAYER

render_hud = true
render_weapon = true
render_crosshair = false
render_particles = true
render_decals = true

living_reward = 0.05
death_penalty = 100

# Mismo orden que action_to_vizdoom en policy/actions.py
# [MOVE_FORWARD, MOVE_BACKWARD, TURN_LEFT, TURN_RIGHT, ATTACK, USE, MOVE_LEFT, MOVE_RIGHT]
available_buttons = {MOVE_FORWARD MOVE_BACKWARD TURN_LEFT TURN_RIGHT ATTACK USE MOVE_LEFT MOVE_RIGHT}

available_game_variables = {HEALTH AMMO2 KILLCOUNT POSITION_X}

episode_timeout = 2100
episode_start_time = 10
