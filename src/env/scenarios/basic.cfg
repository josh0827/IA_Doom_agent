# Escenario básico de Doom para el agente YOLO
# doom_scenario_path se inyecta en codigo via vzd.scenarios_path

doom_map = map01

screen_resolution = RES_640X480
screen_format = RGB24
window_visible = false
mode = PLAYER

render_hud = true
render_weapon = true
render_crosshair = false
render_particles = true
render_decals = true

living_reward = -1
death_penalty = 100

# Orden debe coincidir exactamente con action_to_vizdoom en policy/actions.py
# [MOVE_FORWARD, MOVE_BACKWARD, TURN_LEFT, TURN_RIGHT, ATTACK, USE]
available_buttons = {MOVE_FORWARD MOVE_BACKWARD TURN_LEFT TURN_RIGHT ATTACK USE}

available_game_variables = {HEALTH AMMO2}

episode_timeout = 2100
episode_start_time = 14
