# Arena de demo (mapa health_gathering): sala cuadrada cerrada SIN enemigos
# nativos. Se usa solo para la demo del Streamlit: con cheats activos spawneamos
# a mano unicamente enemigos de alta detectabilidad (Demon=pinky 0.96,
# Zombieman 0.83) y damos god+armas para una demostracion visual limpia de
# percepcion + disparo. El .wad (health_gathering.wad) lo trae el paquete vizdoom
# y DoomEnv lo inyecta por nombre.
#
# Mismo layout de 8 botones que defend_the_center para reutilizar la politica de
# sala (dqn_room.pt) sin reentrenar.

doom_skill = 3

screen_resolution = RES_640X480
screen_format = RGB24
window_visible = false
mode = PLAYER

render_hud = true
render_weapon = true
render_crosshair = false
render_particles = true
render_decals = true

living_reward = 0.0
death_penalty = 0

# Orden identico a action_to_vizdoom en policy/actions.py
# [MOVE_FORWARD, MOVE_BACKWARD, TURN_LEFT, TURN_RIGHT, ATTACK, USE, MOVE_LEFT, MOVE_RIGHT]
available_buttons = {MOVE_FORWARD MOVE_BACKWARD TURN_LEFT TURN_RIGHT ATTACK USE MOVE_LEFT MOVE_RIGHT}

available_game_variables = {HEALTH AMMO2 KILLCOUNT POSITION_X}

episode_timeout = 2100
episode_start_time = 10
